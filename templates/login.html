<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Task Board | Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* A tiny bit of custom CSS just to perfectly center the card on the screen */
        body {
            height: 100vh;
            background-color: #f8f9fa;
            /* Bootstrap's 'bg-light' color */
        }
    </style>
</head>

<body class="d-flex align-items-center">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">

                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-4 p-md-5">
                        <h3 class="text-center mb-4 fw-bold">Smart Board</h3>

                        <form id="login-form">
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" required autocomplete="username"
                                    placeholder="Enter username">
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" required
                                    autocomplete="current-password" placeholder="Enter password">
                            </div>

                            <div id="error-message" class="alert alert-danger d-none py-2 text-center" role="alert">
                                Invalid credentials.
                            </div>
                            <div id="success-message" class="alert alert-success d-none py-2 text-center" role="alert">
                                Login successful!
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" id="submit-btn" class="btn btn-dark btn-lg">Sign In</button>
                            </div>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-message');
            const successMsg = document.getElementById('success-message');
            const btn = document.getElementById('submit-btn');

            // Reset UI (using Bootstrap's d-none class to hide elements)
            errorMsg.classList.add('d-none');
            successMsg.classList.add('d-none');
            btn.textContent = 'Signing in...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/token/pair', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);

                    successMsg.classList.remove('d-none');
                    btn.textContent = 'Authenticated';
                    
                    // Redirect to home page
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 500);
                } else {
                    errorMsg.classList.remove('d-none');
                    btn.textContent = 'Sign In';
                    btn.disabled = false;
                }
            } catch (error) {
                errorMsg.textContent = 'Unable to connect to the server.';
                errorMsg.classList.remove('d-none');
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
